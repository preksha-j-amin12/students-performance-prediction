<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("/static/img.webp") no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            background: rgba(0,0,0,0.6);
            color: white;
            width: 400px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Performance Predictor</h2>

    <form action="/predict" method="post">

        <!-- Student Details -->
        <input type="text" name="name" placeholder="Student Name" required>
        <input type="text" name="usn" placeholder="USN" required>
        <input type="text" name="branch" placeholder="Branch" required>

        <!-- Academic Data -->
        <input type="number" step="any" name="prev_cgpa" placeholder="Previous CGPA" required>
        <input type="number" step="any" name="prev_sgpa" placeholder="Previous SGPA" required>
        <input type="number" step="any" name="curr_cgpa" placeholder="Current CGPA" required>
        <input type="number" step="any" name="curr_sgpa" placeholder="Current SGPA" required>
        <input type="number" step="any" name="attendance" placeholder="Attendance (%)" required>
        <input type="number" step="any" name="project" placeholder="Project Marks" required>

        <button type="submit">Predict</button>
    </form>
</div>

</body>
</html>
