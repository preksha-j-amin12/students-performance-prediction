<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* ✅ Background Image */
            background: url("{{ url_for('static', filename='img.webp') }}") no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.6); /* dark overlay */
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            text-align: center;
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Performance Predictor</h2>

    <form action="/predict" method="POST">

        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="usn" placeholder="USN" required>

        <select name="branch" required>
            <option value="">Select Branch</option>
            <option value="CSE">CSE</option>
            <option value="ISE">ISE</option>
            <option value="ECE">ECE</option>
            <option value="ME">ME</option>
        </select>

        <input type="number" step="0.01" name="prev_cgpa" placeholder="Previous CGPA" required>
        <input type="number" step="0.01" name="prev_sgpa" placeholder="Previous SGPA" required>
        <input type="number" step="0.01" name="curr_cgpa" placeholder="Current CGPA" required>
        <input type="number" step="0.01" name="curr_sgpa" placeholder="Current SGPA" required>

        <input type="number" name="attendance" placeholder="Attendance (%)" required>
        <input type="number" name="project" placeholder="Project Marks" required>

        <button type="submit">Predict</button>

    </form>

    <!-- ✅ Prediction Result -->
    <div class="result">
        {{ prediction_text }}
    </div>

    <!-- ✅ Graph -->
    {% if graph %}
        <img src="{{ url_for('static', filename=graph) }}" width="100%">
    {% endif %}

    <br><br>

    <a href="/students">
        <button>View All Students</button>
    </a>

</div>

</body>
</html>
